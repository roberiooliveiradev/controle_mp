services:
  controle-mp-db:
    image: ${POSTGRES_IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME}-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - controle_mp_db_data:/var/lib/postgresql/data
    networks:
      - controle-mp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  controle-mp-api:
    build:
      context: ${API_BUILD_CONTEXT}
      dockerfile: ${API_DOCKERFILE}
    container_name: ${COMPOSE_PROJECT_NAME}-api
    env_file:
      - .env
    ports:
      - "${API_HOST_PORT}:5000"
    volumes:
      - ${API_UPLOADS_HOST_PATH}:${FILES_BASE_PATH}
    depends_on:
      controle-mp-db:
        condition: service_healthy
    networks:
      - controle-mp-net

  controle-mp-front:
    build:
      context: ${FRONT_BUILD_CONTEXT}
      dockerfile: ${FRONT_DOCKERFILE}
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_API_PREFIX: ${VITE_API_PREFIX}
        VITE_SOCKET_PATH: ${VITE_SOCKET_PATH}
        VITE_DELPI_PARENT_ORIGIN: ${VITE_DELPI_PARENT_ORIGIN}
    container_name: ${COMPOSE_PROJECT_NAME}-front
    ports:
      - "${FRONT_HOST_PORT}:80"
    depends_on:
      - controle-mp-api
    networks:
      - controle-mp-net

volumes:
  controle_mp_db_data:
    name: ${COMPOSE_PROJECT_NAME}_db_data

networks:
  controle-mp-net:
    name: ${COMPOSE_PROJECT_NAME}_net
    driver: ${DOCKER_NETWORK_DRIVER}